name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          pip install -e .

      - name: Lint JavaScript (syntax check)
        run: |
          $failed = $false
          Get-ChildItem screenmind/api/static/js/*.js | ForEach-Object {
            Write-Host "Checking $($_.Name)..."
            node --check $_.FullName 2>&1
            if ($LASTEXITCODE -ne 0) { $failed = $true }
          }
          if ($failed) { exit 1 }

      - name: Lint — no bare print() in source
        run: |
          flake8 --select=T201 --exclude=tests/,screenmind/ui/overlay.py,screenmind/setup_llama.py,screenmind/setup_wizard.py .

      - name: Run tests with coverage
        run: |
          pytest --cov=screenmind --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
